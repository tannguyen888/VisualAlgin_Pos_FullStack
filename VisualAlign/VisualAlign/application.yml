spring:
  security:
    oauth2:
      client:
        registration:
          google:
            # Root-level config can override src/main/resources/application.properties.
            # Keep valid values here to avoid invalid_client when running from project root.
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile